<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffb7c5" />
  <title>💕 Para você</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100dvh; overflow-x: hidden; }
    body { -webkit-font-smoothing: antialiased; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef } = React;

    // ─── Lista de músicas ─────────────────────────────────────────────────────
    // Coloque seus .mp3 na pasta "musicas/" no repositório e liste os nomes aqui:
    const MUSICAS = [
      "musicas/vem-ser-minha.mp3",
      // "musicas/outra-musica.mp3",  <- adicione mais se quiser
    ];
    // ─────────────────────────────────────────────────────────────────────────

    function MusicPlayer() {
      const audioRef = useRef(null);
      const indexRef = useRef(0);
      const [playing, setPlaying] = React.useState(false);
      const [started, setStarted] = React.useState(false);

      const play = (idx) => {
        if (!audioRef.current || MUSICAS.length === 0) return;
        audioRef.current.src = MUSICAS[idx];
        audioRef.current.volume = 0.55;
        audioRef.current.play()
          .then(() => { setPlaying(true); setStarted(true); })
          .catch(() => {});
      };

      const toggle = () => {
        if (!started) { play(0); return; }
        if (playing) { audioRef.current.pause(); setPlaying(false); }
        else { audioRef.current.play(); setPlaying(true); }
      };

      const next = () => {
        indexRef.current = (indexRef.current + 1) % MUSICAS.length;
        play(indexRef.current);
      };

      return React.createElement(React.Fragment, null,
        React.createElement("audio", { ref: audioRef, onEnded: next }),
        MUSICAS.length > 0 && React.createElement("button", {
          onClick: toggle,
          style: {
            position:"fixed", bottom:18, right:18, zIndex:100,
            background:"rgba(255,255,255,0.72)", backdropFilter:"blur(10px)",
            WebkitBackdropFilter:"blur(10px)",
            border:"1.5px solid rgba(201,24,74,0.25)", borderRadius:50,
            padding:"10px 20px", cursor:"pointer",
            boxShadow:"0 4px 20px rgba(201,24,74,0.18)",
            display:"flex", alignItems:"center", gap:8,
            color:"#c9184a", fontWeight:600, fontFamily:"inherit",
            transition:"transform 0.15s", fontSize:16
          },
          onMouseEnter: e => e.currentTarget.style.transform = "scale(1.1)",
          onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
        },
          React.createElement("span", { style:{fontSize:20} }, playing ? "🔇" : "🎵"),
          React.createElement("span", null, playing ? "Pausar" : "Tocar música")
        )
      );
    }

    function App() {
      const [phase, setPhase] = useState("question");
      const [noPos, setNoPos] = useState({ top: "62%", left: "62%" });
      const [noCount, setNoCount] = useState(0);
      const [petals, setPetals] = useState([]);
      const [hearts, setHearts] = useState([]);
      const idRef = useRef(0);

      // Gera pétalas continuamente
      useEffect(() => {
        if (phase !== "question") return;
        const add = () => {
          setPetals(p => [...p.slice(-16), {
            id: idRef.current++,
            left: Math.random() * 100,
            emoji: Math.random() > 0.5 ? "🌸" : "🌷",
            size: 14 + Math.random() * 14,
            dur: 5 + Math.random() * 4,
            delay: Math.random() * 1.5
          }]);
        };
        add();
        const iv = setInterval(add, 700);
        return () => clearInterval(iv);
      }, [phase]);

      // Chuva de corações no sucesso
      useEffect(() => {
        if (phase !== "success") return;
        const burst = () => {
          const batch = Array.from({ length: 12 }, () => ({
            id: idRef.current++,
            left: 10 + Math.random() * 80,
            bottom: 5 + Math.random() * 40,
            size: 18 + Math.random() * 24,
            dx: (Math.random() - 0.5) * 80
          }));
          setHearts(h => [...h, ...batch]);
          setTimeout(() => setHearts(h => h.slice(batch.length)), 3000);
        };
        burst();
        const iv = setInterval(burst, 1800);
        return () => clearInterval(iv);
      }, [phase]);

      const flee = () => {
        let newTop, newLeft;
        do {
          newTop = 8 + Math.random() * 76;
          newLeft = 5 + Math.random() * 78;
        } while (
          Math.abs(newTop - parseFloat(noPos.top)) < 12 &&
          Math.abs(newLeft - parseFloat(noPos.left)) < 12
        );
        setNoPos({ top: `${newTop}%`, left: `${newLeft}%` });
        setNoCount(c => c + 1);
      };

      const noLabels = ["Não 🙄","Tenta de novo 😏","Claro que não!","Nem pense! 🏃","Nunca! 😂","Impossível!","Tá louco(a)?","Para de tentar!"];

      const bgStyle = {
        position: "relative",
        minHeight: "100dvh",
        width: "100%",
        overflow: "hidden",
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        background: "radial-gradient(ellipse at 30% 15%, #ffe4ec 0%, #ffc2d4 35%, #ffb7c5 65%, #ff8fab 100%)",
        fontFamily: "'Georgia', 'Times New Roman', serif"
      };

      return React.createElement("div", { style: bgStyle },

        // Glow blobs
        React.createElement("div", { style: { position:"absolute", top:-120, right:-120, width:520, height:520, borderRadius:"50%", background:"rgba(255,183,197,0.3)", filter:"blur(70px)", pointerEvents:"none" }}),
        React.createElement("div", { style: { position:"absolute", bottom:-100, left:-100, width:420, height:420, borderRadius:"50%", background:"rgba(255,143,171,0.22)", filter:"blur(60px)", pointerEvents:"none" }}),

        // Pétalas
        ...petals.map(p =>
          React.createElement("div", {
            key: p.id,
            style: { position:"absolute", top:0, left:`${p.left}%`, fontSize:p.size, pointerEvents:"none", userSelect:"none", zIndex:0,
              animation: `fall ${p.dur}s ${p.delay}s linear forwards` }
          }, p.emoji)
        ),

        // Corações flutuantes
        ...hearts.map(h =>
          React.createElement("div", {
            key: h.id,
            style: { position:"absolute", left:`${h.left}%`, bottom:`${h.bottom}%`, fontSize:h.size, pointerEvents:"none", userSelect:"none", zIndex:50,
              animation: `floatUp 2.5s ease-out forwards` }
          }, "❤️")
        ),

        // FASE: PERGUNTA
        phase === "question" && React.createElement("div", {
          style: { position:"relative", zIndex:10, display:"flex", flexDirection:"column", alignItems:"center", gap:28, padding:"0 24px", textAlign:"center", animation:"fadeInUp 0.6s ease-out" }
        },
          React.createElement("div", { style: { fontSize:"clamp(60px,14vw,96px)", lineHeight:1, animation:"pulse 1.8s ease-in-out infinite" }}, "💕"),
          React.createElement("div", null,
            React.createElement("h1", { style: { fontSize:"clamp(2rem,7vw,4rem)", color:"#8b1a4a", fontWeight:"bold", textShadow:"2px 2px 14px rgba(255,143,171,0.55)", letterSpacing:"-0.02em", lineHeight:1.1 }}, "Você me ama?"),
            React.createElement("p", { style: { color:"#c0427a", marginTop:10, fontSize:"clamp(0.85rem,2.5vw,1.05rem)" }}, "Pense bem antes de responder... 🌸")
          ),
          React.createElement("button", {
            onClick: () => setPhase("success"),
            style: { background:"linear-gradient(135deg,#ff6b9d,#c9184a)", color:"white", border:"none", borderRadius:50, padding:"16px 52px", fontSize:"clamp(1rem,3.5vw,1.3rem)", fontWeight:"bold", cursor:"pointer", boxShadow:"0 8px 32px rgba(201,24,74,0.38)", letterSpacing:"0.04em", fontFamily:"inherit", transition:"transform 0.15s" },
            onMouseEnter: e => e.target.style.transform = "scale(1.08)",
            onMouseLeave: e => e.target.style.transform = "scale(1)"
          }, "💖 Sim, claro!"),
          noCount > 0 && React.createElement("p", { style: { color:"#c0427a", fontSize:"clamp(0.7rem,2vw,0.85rem)", opacity:0.7, fontStyle:"italic" }},
            noCount < 3 ? "Esse botão não quer ser clicado... 😅" : noCount < 6 ? "Desista! O 'Sim' é o único caminho 💕" : "Você é teimoso(a) hein! 😂❤️"
          )
        ),

        // FASE: SUCESSO
        phase === "success" && React.createElement("div", {
          style: { position:"relative", zIndex:10, display:"flex", flexDirection:"column", alignItems:"center", gap:24, padding:"0 24px", textAlign:"center", maxWidth:480, margin:"0 auto", animation:"scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1)" }
        },
          React.createElement("div", { style: { fontSize:"clamp(56px,13vw,90px)", lineHeight:1, animation:"wiggle 0.7s ease-out 0.3s" }}, "❤️"),
          React.createElement("h2", { style: { fontSize:"clamp(1.6rem,5.5vw,2.6rem)", color:"#8b1a4a", fontWeight:"bold", textShadow:"1px 1px 12px rgba(255,143,171,0.65)", lineHeight:1.2 }}, "Eu sabia! 🥰"),
          React.createElement("div", { style: { background:"rgba(255,255,255,0.52)", backdropFilter:"blur(14px)", WebkitBackdropFilter:"blur(14px)", borderRadius:24, padding:"clamp(20px,5vw,34px)", border:"1.5px solid rgba(255,143,171,0.38)", boxShadow:"0 8px 42px rgba(201,24,74,0.13)" }},
            React.createElement("p", { style: { color:"#6b1535", fontSize:"clamp(0.9rem,2.5vw,1.15rem)", lineHeight:1.8, fontStyle:"italic" }},
              "Eu também te amo muito! Você é o amor da minha vida. Obrigado por sempre estar comigo nos momentos tristes e felizes."
            ),
            React.createElement("p", { style: { color:"#c9184a", fontSize:"clamp(1rem,3vw,1.3rem)", marginTop:18, fontWeight:"bold" }},
              "Te amo muito xuxubah! ❤️❤️"
            )
          ),
          React.createElement("div", { style: { fontSize:"clamp(1.4rem,5vw,2rem)", letterSpacing:6 }}, "💕🌸💕🌸💕")
        ),

        // BOTÃO NÃO - foge
        phase === "question" && React.createElement("button", {
          onMouseEnter: flee,
          onTouchStart: e => { e.preventDefault(); flee(); },
          style: {
            position:"absolute",
            top: noPos.top,
            left: noPos.left,
            transform: "translate(-50%,-50%)",
            background:"rgba(255,255,255,0.48)",
            backdropFilter:"blur(8px)",
            WebkitBackdropFilter:"blur(8px)",
            color:"#c9184a",
            border:"1.5px solid rgba(201,24,74,0.28)",
            borderRadius:50,
            padding:"12px 30px",
            fontSize:"clamp(0.8rem,2.5vw,1rem)",
            cursor:"pointer",
            fontWeight:"600",
            zIndex:20,
            fontFamily:"inherit",
            whiteSpace:"nowrap",
            boxShadow:"0 4px 16px rgba(201,24,74,0.12)",
            transition:"top 0.4s cubic-bezier(0.34,1.56,0.64,1), left 0.4s cubic-bezier(0.34,1.56,0.64,1)"
          }
        }, noLabels[Math.min(noCount, noLabels.length - 1)])
      );
    }

    function Root() {
      return React.createElement(React.Fragment, null,
        React.createElement(App),
        React.createElement(MusicPlayer)
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root));
  </script>
  <style>
    @keyframes fall {
      from { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10% { opacity: 0.9; }
      90% { opacity: 0.9; }
      to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0); opacity: 0; }
      20%  { opacity: 1; transform: translateY(-20px) scale(1.2); }
      80%  { opacity: 1; }
      100% { transform: translateY(-140px) scale(0.8); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.8); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes wiggle {
      0%  { transform: rotate(0deg); }
      25% { transform: rotate(-12deg); }
      50% { transform: rotate(12deg); }
      75% { transform: rotate(-8deg); }
      100%{ transform: rotate(0deg); }
    }
    button:active { transform: scale(0.95) translate(-50%,-50%) !important; }
  </style>
</body>
</html>
