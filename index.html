<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#ffb7c5" />
  <title>💕 Para você</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; min-height: 100dvh; overflow-x: hidden; }
    body { -webkit-font-smoothing: antialiased; }

    @keyframes fall {
      from { transform: translateY(-40px) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.85; }
      90%  { opacity: 0.85; }
      to   { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) scale(0); opacity: 0; }
      20%  { opacity: 1; transform: translateY(-20px) scale(1.2); }
      80%  { opacity: 1; }
      100% { transform: translateY(-150px) scale(0.7); opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.13); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.82); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes wiggle {
      0%   { transform: rotate(0deg); }
      25%  { transform: rotate(-13deg); }
      50%  { transform: rotate(13deg); }
      75%  { transform: rotate(-8deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes bounceIn {
      from { opacity: 0; transform: scale(0.7) translateY(18px); }
      60%  { transform: scale(1.09) translateY(-4px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-60px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background: #8b1a4a;
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: text-bottom;
      height: 1.1em;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── 🎵 Músicas — coloque os .mp3 na pasta musicas/ do repositório ────────
    const MUSICAS = [
      "musicas/vem-ser-minha.mp3",
      // "musicas/outra-musica.mp3",
    ];
    // ─────────────────────────────────────────────────────────────────────────

    // ─── 💌 Frases do carrossel ───────────────────────────────────────────────
    const FRASES = [
      "Eu também te amo muito! Você é o amor da minha vida. Obrigado por sempre estar comigo nos momentos tristes e felizes. Te amo muito, xuxubah! ❤️",
      "Eu amo cada detalhe seu, desde o seu sorriso até o jeito que você me faz sentir a pessoa mais especial do mundo. Você brilha mais que qualquer estrela. ✨",
      "O seu coração é o lugar onde eu sempre quero morar. Cada momento ao seu lado vale mais do que qualquer coisa nesse mundo. 🌸",
      "Se a vida fosse um filme, eu daria replay em cada momento que passamos juntos. Você é minha protagonista favorita, hoje e sempre. 🎬💕",
    ];
    // ─────────────────────────────────────────────────────────────────────────

    // Efeito máquina de escrever
    function Typewriter({ text, speed = 28, onDone }) {
      const [displayed, setDisplayed] = useState("");
      const [done, setDone] = useState(false);
      const i = useRef(0);

      useEffect(() => {
        setDisplayed("");
        setDone(false);
        i.current = 0;
        const iv = setInterval(() => {
          i.current++;
          setDisplayed(text.slice(0, i.current));
          if (i.current >= text.length) {
            clearInterval(iv);
            setDone(true);
            if (onDone) setTimeout(onDone, 600);
          }
        }, speed);
        return () => clearInterval(iv);
      }, [text]);

      return React.createElement("span", null,
        displayed,
        !done && React.createElement("span", { className: "cursor" })
      );
    }

    // Pétalas caindo
    function Petals({ active }) {
      const [petals, setPetals] = useState([]);
      const idRef = useRef(0);

      useEffect(() => {
        if (!active) return;
        const add = () => setPetals(p => [...p.slice(-18), {
          id: idRef.current++,
          left: Math.random() * 100,
          emoji: Math.random() > 0.5 ? "🌸" : "🌷",
          size: 14 + Math.random() * 14,
          dur: 5 + Math.random() * 4,
          delay: Math.random() * 1.2
        }]);
        add();
        const iv = setInterval(add, 650);
        return () => clearInterval(iv);
      }, [active]);

      return React.createElement(React.Fragment, null,
        ...petals.map(p => React.createElement("div", {
          key: p.id,
          style: {
            position: "absolute", top: 0, left: `${p.left}%`,
            fontSize: p.size, pointerEvents: "none", userSelect: "none", zIndex: 0,
            animation: `fall ${p.dur}s ${p.delay}s linear forwards`
          }
        }, p.emoji))
      );
    }

    // Corações flutuantes
    function FloatingHearts({ active }) {
      const [hearts, setHearts] = useState([]);
      const idRef = useRef(0);

      useEffect(() => {
        if (!active) return;
        const burst = () => {
          const batch = Array.from({ length: 13 }, () => ({
            id: idRef.current++,
            left: 8 + Math.random() * 84,
            bottom: 4 + Math.random() * 42,
            size: 18 + Math.random() * 24,
          }));
          setHearts(h => [...h, ...batch]);
          setTimeout(() => setHearts(h => h.slice(batch.length)), 3200);
        };
        burst();
        const iv = setInterval(burst, 1800);
        return () => clearInterval(iv);
      }, [active]);

      return React.createElement(React.Fragment, null,
        ...hearts.map(h => React.createElement("div", {
          key: h.id,
          style: {
            position: "absolute", left: `${h.left}%`, bottom: `${h.bottom}%`,
            fontSize: h.size, pointerEvents: "none", userSelect: "none", zIndex: 50,
            animation: "floatUp 2.6s ease-out forwards"
          }
        }, "❤️"))
      );
    }

    // Tela splash
    function SplashScreen({ onEnter }) {
      return React.createElement("div", {
        onClick: onEnter,
        style: {
          position: "fixed", inset: 0, zIndex: 999,
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          background: "radial-gradient(ellipse at 30% 15%, #ffe4ec 0%, #ffc2d4 35%, #ffb7c5 65%, #ff8fab 100%)",
          cursor: "pointer", fontFamily: "'Georgia','Times New Roman',serif",
          animation: "fadeIn 0.5s ease-out"
        }
      },
        React.createElement("div", {
          style: { display: "flex", flexDirection: "column", alignItems: "center", gap: 22, textAlign: "center", padding: "0 32px" }
        },
          React.createElement("div", { style: { fontSize: "clamp(56px,14vw,88px)", animation: "pulse 1.8s ease-in-out infinite" } }, "💕"),
          React.createElement("h1", {
            style: { fontSize: "clamp(1.5rem,5vw,2.6rem)", color: "#8b1a4a", fontWeight: "bold", textShadow: "2px 2px 14px rgba(255,143,171,0.6)", lineHeight: 1.2 }
          }, "Tenho algo especial para você"),
          React.createElement("p", {
            style: { color: "#c0427a", fontSize: "clamp(0.85rem,2.5vw,1rem)", opacity: 0.85 }
          }, "Toque para abrir 🌸"),
          React.createElement("div", {
            style: {
              marginTop: 8, background: "linear-gradient(135deg,#ff6b9d,#c9184a)",
              color: "white", borderRadius: 50, padding: "14px 44px",
              fontSize: "clamp(0.95rem,3vw,1.15rem)", fontWeight: "bold",
              boxShadow: "0 8px 32px rgba(201,24,74,0.38)", letterSpacing: "0.04em",
              animation: "bounceIn 0.8s ease-out 0.3s both"
            }
          }, "💖 Abrir")
        )
      );
    }

    // Tela principal com pergunta
    function QuestionScreen({ onYes }) {
      const [noPos, setNoPos] = useState({ top: "62%", left: "64%" });
      const [noCount, setNoCount] = useState(0);

      const flee = useCallback(() => {
        setNoPos(prev => {
          let t, l;
          do {
            t = 10 + Math.random() * 72;
            l = 10 + Math.random() * 72;
          } while (Math.abs(t - parseFloat(prev.top)) < 15 && Math.abs(l - parseFloat(prev.left)) < 15);
          return { top: `${t}%`, left: `${l}%` };
        });
        setNoCount(c => c + 1);
      }, []);

      const noLabels = ["Não 🙄","Tenta de novo 😏","Claro que não!","Nem pense! 🏃","Nunca! 😂","Impossível!","Tá louca?","Para de tentar!"];

      const hintMsg = noCount < 3
        ? "Esse botão não quer ser clicado... 😅"
        : noCount < 6 ? "Desista! O 'Sim' é o único caminho 💕"
        : "Você é teimosa hein! 😂❤️";

      return React.createElement(React.Fragment, null,
        // Conteúdo central
        React.createElement("div", {
          style: { position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 28, padding: "0 24px", textAlign: "center", animation: "fadeInUp 0.6s ease-out" }
        },
          React.createElement("div", { style: { fontSize: "clamp(60px,14vw,96px)", lineHeight: 1, animation: "pulse 1.8s ease-in-out infinite" } }, "💕"),
          React.createElement("div", null,
            React.createElement("h1", { style: { fontSize: "clamp(2rem,7vw,4rem)", color: "#8b1a4a", fontWeight: "bold", textShadow: "2px 2px 14px rgba(255,143,171,0.55)", letterSpacing: "-0.02em", lineHeight: 1.1 } }, "Você me ama?"),
            React.createElement("p", { style: { color: "#c0427a", marginTop: 10, fontSize: "clamp(0.85rem,2.5vw,1.05rem)" } }, "Pense bem antes de responder... 🌸")
          ),
          // Botão SIM
          React.createElement("button", {
            onClick: onYes,
            style: { background: "linear-gradient(135deg,#ff6b9d,#c9184a)", color: "white", border: "none", borderRadius: 50, padding: "16px 52px", fontSize: "clamp(1rem,3.5vw,1.3rem)", fontWeight: "bold", cursor: "pointer", boxShadow: "0 8px 32px rgba(201,24,74,0.38)", letterSpacing: "0.04em", fontFamily: "inherit", transition: "transform 0.15s", position: "relative", zIndex: 15 },
            onMouseEnter: e => e.currentTarget.style.transform = "scale(1.08)",
            onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
          }, "💖 Sim, claro!"),
          noCount > 0 && React.createElement("p", { style: { color: "#c0427a", fontSize: "clamp(0.7rem,2vw,0.85rem)", opacity: 0.75, fontStyle: "italic" } }, hintMsg)
        ),

        // Botão NÃO — foge com position:fixed
        React.createElement("button", {
          onMouseEnter: flee,
          onTouchStart: e => { e.preventDefault(); flee(); },
          style: {
            position: "fixed",
            top: noPos.top, left: noPos.left,
            transform: "translate(-50%,-50%)",
            background: "rgba(255,255,255,0.52)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)",
            color: "#c9184a", border: "1.5px solid rgba(201,24,74,0.28)", borderRadius: 50,
            padding: "12px 30px", fontSize: "clamp(0.8rem,2.5vw,1rem)", cursor: "pointer",
            fontWeight: "600", zIndex: 20, fontFamily: "inherit", whiteSpace: "nowrap",
            boxShadow: "0 4px 16px rgba(201,24,74,0.12)",
            transition: "top 0.38s cubic-bezier(0.34,1.56,0.64,1), left 0.38s cubic-bezier(0.34,1.56,0.64,1)"
          }
        }, noLabels[Math.min(noCount, noLabels.length - 1)])
      );
    }

    // Carrossel de fotos
    const FOTOS = [
      { src: "fotos/IMG-20260201-WA0102.jpg",  msg: "Esse abraço é o meu lugar favorito no mundo inteiro 🥰" },
      { src: "fotos/IMG-20260308-WA0034.jpg",  msg: "Adoro o seu sorriso... ele ilumina qualquer lugar ✨" },
      { src: "fotos/IMG-20260308-WA0032.jpg",  msg: "Esse jeito fofo seu me faz apaixonar todo dia 🤓💕" },
      { src: "fotos/IMG-20260308-WA0033.jpg",  msg: "Você é tão linda que dói no coração te olhar assim 😍" },
      { src: "fotos/WA_1772998253772.jpeg",    msg: "Desde pequenininha já era incrível... e só foi ficando mais linda 💖" },
      { src: "fotos/IMG-20260201-WA0113.jpg",  msg: "Quero ficar pertinho de você para sempre, assim, do seu lado 🌸" },
    ];

    function PhotoCarousel() {
      const [idx, setIdx] = useState(0);
      const [dir, setDir] = useState(1); // 1 = next, -1 = prev
      const [animKey, setAnimKey] = useState(0);

      const go = (newIdx, direction) => {
        setDir(direction);
        setAnimKey(k => k + 1);
        setIdx(newIdx);
      };

      const prev = () => go((idx - 1 + FOTOS.length) % FOTOS.length, -1);
      const next = () => go((idx + 1) % FOTOS.length, 1);

      // Swipe support
      const touchStartX = useRef(null);
      const onTouchStart = e => { touchStartX.current = e.touches[0].clientX; };
      const onTouchEnd = e => {
        if (touchStartX.current === null) return;
        const dx = e.changedTouches[0].clientX - touchStartX.current;
        if (dx < -40) next();
        else if (dx > 40) prev();
        touchStartX.current = null;
      };

      const foto = FOTOS[idx];

      return React.createElement("div", {
        style: { position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 20, padding: "24px 16px", textAlign: "center", maxWidth: 460, margin: "0 auto", width: "100%", animation: "fadeInUp 0.6s ease-out" }
      },
        React.createElement("div", { style: { fontSize: "clamp(1.3rem,4vw,1.8rem)", color: "#8b1a4a", fontWeight: "bold", textShadow: "1px 1px 10px rgba(255,143,171,0.6)" } }, "Nossa história em fotos 📸💕"),

        // Foto container
        React.createElement("div", {
          key: animKey,
          onTouchStart, onTouchEnd,
          style: {
            width: "100%", position: "relative", borderRadius: 24,
            overflow: "hidden", boxShadow: "0 12px 48px rgba(201,24,74,0.25)",
            border: "3px solid rgba(255,143,171,0.5)",
            animation: `slideIn${dir > 0 ? "Right" : "Left"} 0.4s ease-out`,
            background: "#ffb7c5"
          }
        },
          React.createElement("img", {
            src: foto.src, alt: "",
            style: { width: "100%", display: "block", maxHeight: "55vw", objectFit: "cover", minHeight: 200 }
          }),
          // Mensagem sobre a foto
          React.createElement("div", {
            style: {
              position: "absolute", bottom: 0, left: 0, right: 0,
              background: "linear-gradient(to top, rgba(139,26,74,0.82) 0%, rgba(139,26,74,0.4) 70%, transparent 100%)",
              padding: "32px 18px 16px",
              color: "white", fontSize: "clamp(0.85rem,2.5vw,1.05rem)",
              fontStyle: "italic", fontFamily: "'Georgia','Times New Roman',serif",
              textShadow: "0 1px 4px rgba(0,0,0,0.4)"
            }
          }, foto.msg)
        ),

        // Navegação
        React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 16 } },
          // Botão anterior
          React.createElement("button", {
            onClick: prev,
            style: { background: "rgba(255,255,255,0.65)", backdropFilter: "blur(8px)", border: "1.5px solid rgba(201,24,74,0.25)", borderRadius: "50%", width: 44, height: 44, cursor: "pointer", fontSize: 18, color: "#c9184a", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 3px 12px rgba(201,24,74,0.15)", transition: "transform 0.15s" },
            onMouseEnter: e => e.currentTarget.style.transform = "scale(1.12)",
            onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
          }, "‹"),

          // Bolinhas indicadoras
          React.createElement("div", { style: { display: "flex", gap: 7 } },
            ...FOTOS.map((_, i) => React.createElement("div", {
              key: i,
              style: { width: i === idx ? 22 : 8, height: 8, borderRadius: 4, background: i === idx ? "#c9184a" : "rgba(201,24,74,0.28)", transition: "all 0.3s", cursor: "pointer" },
              onClick: () => go(i, i > idx ? 1 : -1)
            }))
          ),

          // Botão próximo
          React.createElement("button", {
            onClick: next,
            style: { background: "rgba(255,255,255,0.65)", backdropFilter: "blur(8px)", border: "1.5px solid rgba(201,24,74,0.25)", borderRadius: "50%", width: 44, height: 44, cursor: "pointer", fontSize: 18, color: "#c9184a", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 3px 12px rgba(201,24,74,0.15)", transition: "transform 0.15s" },
            onMouseEnter: e => e.currentTarget.style.transform = "scale(1.12)",
            onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
          }, "›")
        ),

        // Contador
        React.createElement("p", { style: { color: "#c0427a", fontSize: "0.82rem", opacity: 0.7, fontStyle: "italic" } }, `${idx + 1} de ${FOTOS.length} 💕`)
      );
    }

    // Tela de sucesso com carrossel + typewriter
    function SuccessScreen({ onShowPhotos }) {
      const [idx, setIdx] = useState(0);
      const [typing, setTyping] = useState(true);
      const [btnVisible, setBtnVisible] = useState(false);

      const nextFrase = () => {
        if (idx < FRASES.length - 1) {
          setBtnVisible(false);
          setTyping(false);
          setTimeout(() => {
            setIdx(i => i + 1);
            setTyping(true);
          }, 300);
        }
      };

      const handleDone = () => setBtnVisible(true);

      const isLast = idx === FRASES.length - 1;

      return React.createElement("div", {
        style: { position: "relative", zIndex: 10, display: "flex", flexDirection: "column", alignItems: "center", gap: 22, padding: "24px 24px", textAlign: "center", maxWidth: 500, margin: "0 auto", animation: "scaleIn 0.7s cubic-bezier(0.34,1.56,0.64,1)" }
      },
        React.createElement("div", { style: { fontSize: "clamp(50px,12vw,82px)", lineHeight: 1, animation: "wiggle 0.7s ease-out 0.3s both" } }, "❤️"),
        React.createElement("h2", { style: { fontSize: "clamp(1.5rem,5vw,2.4rem)", color: "#8b1a4a", fontWeight: "bold", textShadow: "1px 1px 12px rgba(255,143,171,0.65)", lineHeight: 1.2 } }, "Eu sabia! 🥰"),

        // Card da frase
        React.createElement("div", {
          style: { background: "rgba(255,255,255,0.55)", backdropFilter: "blur(14px)", WebkitBackdropFilter: "blur(14px)", borderRadius: 24, padding: "clamp(18px,5vw,32px)", border: "1.5px solid rgba(255,143,171,0.38)", boxShadow: "0 8px 42px rgba(201,24,74,0.13)", minHeight: 120, display: "flex", flexDirection: "column", justifyContent: "center", gap: 12 }
        },
          // Indicador de frase
          React.createElement("div", { style: { display: "flex", gap: 6, justifyContent: "center", marginBottom: 4 } },
            ...FRASES.map((_, i) => React.createElement("div", {
              key: i,
              style: { width: i === idx ? 20 : 7, height: 7, borderRadius: 4, background: i === idx ? "#c9184a" : "rgba(201,24,74,0.25)", transition: "all 0.3s" }
            }))
          ),
          typing && React.createElement("p", {
            key: idx,
            style: { color: "#6b1535", fontSize: "clamp(0.88rem,2.4vw,1.1rem)", lineHeight: 1.8, fontStyle: "italic", animation: "fadeIn 0.3s ease-out" }
          },
            React.createElement(Typewriter, { text: FRASES[idx], speed: 25, onDone: handleDone })
          )
        ),

        // Botão próxima / fim
        btnVisible && !isLast && React.createElement("button", {
          onClick: nextFrase,
          style: { background: "linear-gradient(135deg,#ff6b9d,#c9184a)", color: "white", border: "none", borderRadius: 50, padding: "13px 36px", fontSize: "clamp(0.9rem,2.8vw,1.1rem)", fontWeight: "bold", cursor: "pointer", boxShadow: "0 6px 24px rgba(201,24,74,0.35)", fontFamily: "inherit", animation: "bounceIn 0.5s ease-out", transition: "transform 0.15s" },
          onMouseEnter: e => e.currentTarget.style.transform = "scale(1.07)",
          onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
        }, "Próxima mensagem 💌"),

        isLast && btnVisible && React.createElement(React.Fragment, null,
          React.createElement("div", { style: { fontSize: "clamp(1.4rem,5vw,1.9rem)", letterSpacing: 5, animation: "bounceIn 0.5s ease-out" } }, "💕🌸💕🌸💕"),
          React.createElement("button", {
            onClick: onShowPhotos,
            style: { marginTop: 4, background: "linear-gradient(135deg,#ff6b9d,#c9184a)", color: "white", border: "none", borderRadius: 50, padding: "13px 36px", fontSize: "clamp(0.9rem,2.8vw,1.05rem)", fontWeight: "bold", cursor: "pointer", boxShadow: "0 6px 24px rgba(201,24,74,0.35)", fontFamily: "inherit", animation: "bounceIn 0.6s ease-out 0.3s both", transition: "transform 0.15s" },
            onMouseEnter: e => e.currentTarget.style.transform = "scale(1.07)",
            onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
          }, "Ver nossas fotos 📸💕")
        )
      );
    }

    // App principal
    function App({ onYes, onShowPhotos, phase }) {
      const bg = {
        position: "relative", minHeight: "100dvh", width: "100%", overflow: "hidden",
        display: "flex", alignItems: "center", justifyContent: "center",
        background: "radial-gradient(ellipse at 30% 15%, #ffe4ec 0%, #ffc2d4 35%, #ffb7c5 65%, #ff8fab 100%)",
        fontFamily: "'Georgia','Times New Roman',serif"
      };

      return React.createElement("div", { style: bg },
        React.createElement("div", { style: { position: "absolute", top: -120, right: -120, width: 520, height: 520, borderRadius: "50%", background: "rgba(255,183,197,0.28)", filter: "blur(70px)", pointerEvents: "none" } }),
        React.createElement("div", { style: { position: "absolute", bottom: -100, left: -100, width: 420, height: 420, borderRadius: "50%", background: "rgba(255,143,171,0.2)", filter: "blur(60px)", pointerEvents: "none" } }),

        React.createElement(Petals, { active: phase === "question" }),
        React.createElement(FloatingHearts, { active: phase === "success" }),

        phase === "question" ? React.createElement(QuestionScreen, { onYes })
        : phase === "success" ? React.createElement(SuccessScreen, { onShowPhotos })
        : React.createElement(PhotoCarousel)
      );
    }

    // Root — gerencia splash + música
    function Root() {
      const [showSplash, setShowSplash] = useState(true);
      const [phase, setPhase] = useState("question"); // question | success | photos
      const [playing, setPlaying] = useState(false);
      const audioRef = useRef(null);
      const indexRef = useRef(0);

      const nextTrack = () => {
        if (!audioRef.current || MUSICAS.length === 0) return;
        indexRef.current = (indexRef.current + 1) % MUSICAS.length;
        audioRef.current.src = MUSICAS[indexRef.current];
        audioRef.current.play().catch(() => {});
      };

      const handleEnter = () => {
        setShowSplash(false);
        if (audioRef.current && MUSICAS.length > 0) {
          audioRef.current.src = MUSICAS[0];
          audioRef.current.volume = 0.55;
          audioRef.current.play().then(() => setPlaying(true)).catch(() => {});
        }
      };

      const toggleMusic = () => {
        if (!audioRef.current) return;
        if (playing) { audioRef.current.pause(); setPlaying(false); }
        else { audioRef.current.play().then(() => setPlaying(true)).catch(() => {}); }
      };

      return React.createElement(React.Fragment, null,
        React.createElement("audio", { ref: audioRef, onEnded: nextTrack }),

        showSplash
          ? React.createElement(SplashScreen, { onEnter: handleEnter })
          : React.createElement(React.Fragment, null,
              React.createElement(App, { phase, onYes: () => setPhase("success"), onShowPhotos: () => setPhase("photos") }),

              // Botão de música
              MUSICAS.length > 0 && React.createElement("button", {
                onClick: toggleMusic,
                style: {
                  position: "fixed", bottom: 18, right: 18, zIndex: 100,
                  background: "rgba(255,255,255,0.72)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)",
                  border: "1.5px solid rgba(201,24,74,0.25)", borderRadius: 50,
                  padding: "10px 20px", cursor: "pointer",
                  boxShadow: "0 4px 20px rgba(201,24,74,0.18)",
                  display: "flex", alignItems: "center", gap: 8,
                  color: "#c9184a", fontWeight: 600, fontFamily: "inherit",
                  transition: "transform 0.15s", fontSize: 16
                },
                onMouseEnter: e => e.currentTarget.style.transform = "scale(1.1)",
                onMouseLeave: e => e.currentTarget.style.transform = "scale(1)"
              },
                React.createElement("span", { style: { fontSize: 20 } }, playing ? "🔇" : "🎵"),
                React.createElement("span", null, playing ? "Pausar" : "Música")
              )
            )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root));
  </script>
</body>
</html>
